steps:
  # Step 1: Terraform - Update Infrastructure (Firestore, Pub/Sub, IAM)
  - name: 'hashicorp/terraform:1.5.0'
    id: 'terraform-init'
    dir: 'terraform'
    args: ['init']

  - name: 'hashicorp/terraform:1.5.0'
    id: 'terraform-apply'
    dir: 'terraform'
    args: ['apply', '-auto-approve']

  # Step 2: Build Docker image for the application
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/event-app:$COMMIT_SHA', '.']

  # Step 3: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', 'gcr.io/$PROJECT_ID/event-app:$COMMIT_SHA']

  # Step 4: Deploy to Cloud Run (updates the running app)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    args:
      - 'run'
      - 'deploy'
      - 'event-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/event-app:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--service-account'
      - 'event-app-cloud-run@${PROJECT_ID}.iam.gserviceaccount.com'

images:
  - 'gcr.io/$PROJECT_ID/event-app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY