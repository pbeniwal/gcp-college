<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Registration | Karnavati University</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f0f8ff, #e6f0ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            width: 100%;
            max-width: 480px;
            margin: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background: #4285f4;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .logo {
            max-height: 80px;
            margin-bottom: 10px;
        }
        .header h1 {
            font-size: 24px;
        }
        .form-container, .success-container {
            padding: 30px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.2);
        }
        button {
            width: 100%;
            padding: 16px;
            background: #4285f4;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #3367d6;
            transform: translateY(-2px);
        }
        .success {
            background: #e6f4ea;
            color: #137333;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .back-btn {
            background: #34a853;
            margin-top: 15px;
        }
        .footer {
            text-align: center;
            padding: 15px;
            color: #666;
            font-size: 14px;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Logo -->
        <div class="header">
            <img src="https://karnavatiuniversity.edu.in/wp-content/uploads/2023/06/KU-Logo.png" 
                 alt="Karnavati University Logo" class="logo">
            <h1>🎟️ Event Registration</h1>
        </div>

        <!-- Success Message -->
        {% if success %}
        <div class="success-container">
            <div class="success">
                ✅ Registration Successful!<br><br>
                <strong>{{ name }}</strong>, you are now registered for <strong>{{ event }}</strong>.<br>
                Confirmation details have been sent to: <strong>{{ email }}</strong>
            </div>
            
            <!-- Back to Registration Button -->
            <button class="back-btn" onclick="window.location.reload();">
                Register for Another Event
            </button>
        </div>
        {% else %}
        
        <!-- Registration Form -->
        <div class="form-container">
            <form method="POST">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>

                <label>Event Name</label>
                <input type="text" name="event" placeholder="e.g., Tech Fest 2026" required>

                <label>Email Address</label>
                <input type="email" name="email" placeholder="yourname@example.com" required>

                <button type="submit">Register Now</button>
            </form>
        </div>
        {% endif %}

        <!-- Footer -->
        <div class="footer">
            Powered by Google Cloud • Karnavati University, Gandhinagar
        </div>
    </div>
</body>
</html>
