<!DOCTYPE html>
<html>
<head>
    <title>College Event Registration</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; background: #f0f8ff; }
        form { max-width: 400px; margin: 0 auto; }
        input, button { padding: 10px; margin: 10px; width: 100%; }
        button { background: #4285f4; color: white; border: none; cursor: pointer; }
        .success { color: green; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>🎟️ College Event Registration</h1>
    
    {% if success %}
        <p class="success">✅ Thank you {{ name }}! You are registered for {{ event }}.<br>
        Check Pub/Sub for live notification.</p>
    {% endif %}
    
    <form method="POST">
        <input type="text" name="name" placeholder="Your Full Name" required><br>
        <input type="text" name="event" placeholder="Event Name (e.g., Tech Fest)" required><br>
        <button type="submit">Register Now</button>
    </form>
</body>
</html>
